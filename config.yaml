# Stock analysis pipeline config

# Default tickers (fallback if screener can't reach market data)
tickers:
  - XOM
  - BA
  - NVDA
  - AAPL
  - SPY

# Data lookback for training (3 years)
lookback_days: 1095

# Model: random_forest or xgboost
model: random_forest
crisis_downweight: 0.3

# --- Multi-agent pipeline (run_pipeline.py) ---
# Auto-detects backend: Ollama (local) → Anthropic (cloud) → dry-run
pipeline:
  ollama_model: llama3.1:8b
  anthropic_model: claude-sonnet-4-20250514
  max_tickers: 15
  max_positions: 5
  timeout_minutes: 15
